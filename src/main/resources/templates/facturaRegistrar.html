<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registrar Factura</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>

    <div class="starter-template">
        <h1>Los 4 Fantásticos</h1>
        <h2>Registrar Factura</h2>
    </div>

    <div th:if="${mensajeError}" style="color: red; text-align: center;">
        <p th:text="${mensajeError}"></p>
    </div>

    <form th:action="@{/facturas/guardar}" th:object="${factura}" method="post">

        <table border="1" style="margin-left: auto; margin-right: auto; border-collapse: collapse;">
            <tr>
                <td><label>Contrato</label></td>
                <td>
                    <select th:field="*{contrato.id}" required>
                        <option value="">Seleccione un contrato</option>
                        <option th:each="contrato : ${contratos}"
                                th:value="${contrato.id}"
                                th:text="${contrato.descripcion}">
                        </option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><label>Concepto</label></td>
                <td>
                    <input type="text" th:field="*{concepto}" required />
                </td>
            </tr>

            <tr>
                <td><label>Fecha de emisión</label></td>
                <td>
                    <input type="date" th:field="*{fechaEmision}" required />
                </td>
            </tr>

            <tr>
                <td><label>Fecha de vencimiento</label></td>
                <td>
                    <input type="date" th:field="*{fechaVencimiento}" required />
                </td>
            </tr>

            <tr>
                <td><label>Importe</label></td>
                <td>
                    <input type="number" step="0.01" min="0.01" th:field="*{importe}" required />
                </td>
            </tr>
        </table>

        <table class="botones" style="margin-left: auto; margin-right: auto; margin-top: 20px;">
            <tr>
                <td>
                    <button type="submit" class="btn-primary">
                        Guardar factura
                    </button>
                </td>

                <td>
                    <a th:href="@{/facturas}" class="btn-primary">
                        Cancelar
                    </a>
                </td>
            </tr>
        </table>

    </form>

</body>

</html>
