<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Publicación</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>

<body>

<div class="starter-template">
    <h1>Inmobiliaria</h1>

    <h2 th:text="${formBean.id} ? 'Editar publicación' : 'Registrar publicación'"></h2>
</div>

<form th:action="@{/publicacionEditar}" th:object="${formBean}" method="post">

    <p th:each="err : ${#fields.errors('global')}"
       th:text="${err}"
       class="error"/>

    <input type="hidden" th:field="*{id}"/>

    <table>

        <tr>
            <td>Propiedad</td>

            <td>

                <select th:field="*{idPropiedad}"
                        th:disabled="${formBean.id != null}">

                    <option value="">Seleccione...</option>

                    <option th:each="p : ${allPropiedades}"
                            th:value="${p.id}"
                            th:text="${p.direccion}">
                    </option>

                </select>

                <input
                        th:if="${formBean.id != null}"
                        type="hidden"
                        th:field="*{idPropiedad}"/>

            </td>

            <td>
                <p th:errors="*{idPropiedad}"
                   class="error"></p>
            </td>

        </tr>

        <tr>

            <td>Precio mensual</td>

            <td>
                <input type="number"
                       step="0.01"
                       th:field="*{precioMensual}"/>
            </td>

            <td>
                <p th:errors="*{precioMensual}"
                   class="error"></p>
            </td>

        </tr>

        <tr>

            <td>Condiciones</td>

            <td>

                <textarea
                        rows="5"
                        cols="50"
                        th:field="*{condiciones}">
                </textarea>

            </td>

        </tr>

        <tr>

            <td>Descripción</td>

            <td>

                <textarea
                        rows="5"
                        cols="50"
                        th:field="*{descripcion}">
                </textarea>

            </td>

        </tr>

        <tr>

            <td>Fecha publicación</td>

            <td>

                <input
                        type="date"
                        th:field="*{fechaPublicacion}"/>

            </td>

            <td>

                <p th:errors="*{fechaPublicacion}"
                   class="error"></p>

            </td>

        </tr>

        <tr>

            <td>Estado</td>

            <td>

                <select th:field="*{estado}">

                    <option
                            th:each="e : ${allEstados}"
                            th:value="${e}"
                            th:text="${e}">
                    </option>

                </select>

            </td>

        </tr>

    </table>

    <table class="botones">

        <tr>

            <td>

                <button
                        type="submit"
                        name="action"
                        value="actionAceptar">

                    Aceptar

                </button>

            </td>

            <td>

                <button
                        type="submit"
                        name="action"
                        value="actionCancelar">

                    Cancelar

                </button>

            </td>

        </tr>

    </table>

</form>

</body>
</html>
