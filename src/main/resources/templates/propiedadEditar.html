<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title><span th:text="#{propiedad.editar.titulo}" /></title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<script type="text/javascript" src="https://code.jquery.com/jquery-1.11.3.min.js"></script>

<script type="text/javascript"
	src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.4.1/js/bootstrap-datepicker.min.js"></script>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.4.1/css/bootstrap-datepicker3.css" />


<body>
	<div class="starter-template">
		<h1><span th:text="#{empresa}" /></h1>
		<h2 th:text="${formBean.id} ? #{propiedad.editar.titulo}: #{propiedad.registrar.titulo}" />

	</div>
	<form th:action="@{/propiedadEditar}" th:object="${formBean}" method="post">
		<p th:each="err : ${#fields.errors('global')}" th:text="${err}" class="error" />
		<input type="hidden" id="id" th:field="*{id}">
		<table border="0" style="align-self: center;">
			<tr>
				<td><label th:text="#{propiedad.direccion}" /></td>
				<td><input type="text" th:field="*{direccion}" /></td>
				<td>
					<p th:if="${#fields.hasErrors('direccion')}" th:errorclass="error" th:errors="*{direccion}" />
				</td>
			</tr>
			<tr>
				<td><label th:text="#{propiedad.ciudad}" /></td>
				<td>
					<select th:field="*{idCiudad}">
						<option th:each="c : ${allCiudades}" th:value="${c.id}" th:text="${c.nombre}"></option>
					</select>
				</td>
			</tr>
			<tr>
				<td><label th:text="#{propiedad.tipo}" /></td>
				<td>
					<select th:field="*{tipo}">
						<option th:each="t : ${tiposPropiedad}" th:value="${t}"
							th:text="${t}"></option>
					</select>
				</td>
				<td>
					<p th:if="${#fields.hasErrors('tipo')}" th:errorclass="error" th:errors="*{tipo}" />
				</td>
			</tr>
			<tr>
				<td><label th:text="#{propiedad.cantidadAmbientes}" /></td>
				<td><input type="number" th:field="*{cantidadAmbientes}" /></td>
				<td>
					<p th:if="${#fields.hasErrors('cantidadAmbientes')}" th:errorclass="error"
						th:errors="*{cantidadAmbientes}" />
				</td>
			</tr>
			<tr>
				<td><label th:text="#{propiedad.metrosCuadrados}" /></td>
				<td><input type="number" th:field="*{metrosCuadrados}" /></td>
				<td>
					<p th:if="${#fields.hasErrors('metrosCuadrados')}" th:errorclass="error"
						th:errors="*{metrosCuadrados}" />
				</td>
			</tr>
			<tr>
				<td><label th:text="#{propiedad.descripcion}" /></td>
				<td><input type="text" th:field="*{descripcion}" /></td>
				<td>
					<p th:if="${#fields.hasErrors('descripcion')}" th:errorclass="error" th:errors="*{descripcion}" />
				</td>
			</tr>
			<tr>
				<td><label th:text="#{propiedad.comodidades}" /></td>
				<td><input type="text" th:field="*{comodidades}" /></td>
				<td>
					<p th:if="${#fields.hasErrors('comodidades')}" th:errorclass="error" th:errors="*{comodidades}" />
				</td>
			</tr>
			<tr>
				<td><label th:text="#{propiedad.estadoDisponibilidad}" /></td>
				<td>
					<select th:field="*{estadoDisponibilidad}">
						<option th:each="e : ${estadosDisponibilidad}" th:value="${e}"
							th:text="${e}"></option>
					</select>
				</td>
				<td>
					<p th:if="${#fields.hasErrors('estadoDisponibilidad')}" th:errorclass="error"
						th:errors="*{estadoDisponibilidad}" />
				</td>
			</tr>
			<tr>
				<td><label th:text="#{propiedad.propietario}" /></td>
				<td>
					<select th:field="*{idPropietario}">
						<option th:each="p : ${allPropietarios}" th:value="${p.id}" th:text="${p.nombre+''+p.apellido}">
						</option>
					</select>
				</td>
				<td>
					<p th:if="${#fields.hasErrors('idPropietario')}" th:errorclass="error"
						th:errors="*{idPropietario}" />
				</td>
			</tr>
		</table>
		<table class="botones">
			<tr>
				<td><button type="submit" name="action" value="actionAceptar" th:text="#{botones.aceptar}" /></td>
				<td><button type="submit" name="action" value="actionCancelar" th:text="#{botones.cancelar}" /></td>
			</tr>
		</table>
	</form>
</body>
