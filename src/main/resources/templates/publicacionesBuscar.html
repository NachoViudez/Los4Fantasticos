<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Publicaciones</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>

<body>

<div class="starter-template">
    <h1>Inmobiliaria</h1>
    <h2>Listado de Publicaciones</h2>
</div>

<form th:action="@{/publicacionesBuscar}"
      th:object="${formBean}"
      method="post">

    <p th:each="err : ${#fields.errors('global')}"
       th:text="${err}"
       class="error"/>

    <table>

        <tr>

            <td>Propiedad</td>

            <td>

                <select th:field="*{propiedadSeleccionada}">
                    <option value="">Todas</option>

                    <option
                            th:each="p : ${allPropiedades}"
                            th:value="${p.id}"
                            th:text="${p.direccion}">
                    </option>

                </select>

            </td>

        </tr>
		
		<tr>

		    <td>Ciudad</td>

		    <td>

		        <select th:field="*{ciudadSeleccionada}">

		            <option value="">Todas</option>

		            <option
		                    th:each="c : ${allCiudades}"
		                    th:value="${c.id}"
		                    th:text="${c.nombre}">
		            </option>

		        </select>

		    </td>

		</tr>

        <tr>

            <td>Estado</td>

            <td>

                <select th:field="*{estadoSeleccionado}">

                    <option value="">Todos</option>

                    <option
                            th:each="e : ${allEstados}"
                            th:value="${e}"
                            th:text="${e}">
                    </option>

                </select>

            </td>

        </tr>

        <tr>

            <td>Precio mínimo</td>

            <td>

                <input
                        type="number"
                        step="0.01"
                        th:field="*{precioMinimo}"/>

            </td>

        </tr>

        <tr>

            <td>Precio máximo</td>

            <td>

                <input
                        type="number"
                        step="0.01"
                        th:field="*{precioMaximo}"/>

            </td>

        </tr>

    </table>

    <table class="botones">

        <tr>

            <td>

                <button
                        type="submit"
                        name="action"
                        value="actionBuscar">

                    Buscar

                </button>

            </td>

            <td>

                <button
                        type="submit"
                        name="action"
                        value="actionRegistrar">

                    Nueva publicación

                </button>

            </td>

            <td>

                <button
                        type="submit"
                        name="action"
                        value="actionCancelar">

                    Cancelar

                </button>

            </td>

        </tr>

    </table>

</form>

<br>

<table border="1" th:if="${resultados != null}">

    <tr>

        <th>ID</th>
        <th>Dirección</th>
        <th>Ciudad</th>
        <th>Precio</th>
        <th>Fecha</th>
        <th>Estado</th>
        <th>Editar</th>
        <th>Eliminar</th>

    </tr>

    <tr th:each="p : ${resultados}">

        <td th:text="${p.id}"></td>

        <td th:text="${p.propiedad.direccion}"></td>

        <td th:text="${p.propiedad.ciudad.nombre}"></td>

        <td th:text="${p.precioMensual}"></td>

        <td th:text="${p.fechaPublicacion}"></td>

        <td th:text="${p.estado}"></td>

        <td>

            <a th:href="@{/publicacionEditar/{id}(id=${p.id})}">
                Editar
            </a>

        </td>

        <td>

			<button
			        type="submit"
			        th:formaction="@{/publicacionEditar/delete/{id}(id=${p.id})}"
			        formmethod="post"
			        onclick="return confirm('¿Está seguro que desea eliminar esta publicación?');">

			    Eliminar

			</button>

        </td>

    </tr>

</table>

</body>

</html>
