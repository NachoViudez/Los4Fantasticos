<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Editar contrato</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<link rel="stylesheet" th:href="@{/css/main.css}" />
</head>

<body>
	<div class="starter-template">
		<h1><span th:text="#{empresa}" /></h1>
		<h2 th:text="${formBean.id} ? 'Editar contrato' : 'Registrar contrato'" />
	</div>

	<form th:action="@{/contratoEditar}" th:object="${formBean}" method="post">
		<p th:each="err : ${#fields.errors('global')}" th:text="${err}" class="error" />
		<input type="hidden" id="id" th:field="*{id}">

		<table border="0" style="align-self: center;">
			<tr>
				<td><label>Propiedad</label></td>
				<td>
					<select th:field="*{idPropiedadSeleccionada}">
						<option th:each="p : ${allPropiedades}" th:value="${p.id}" th:text="${p.direccion}"></option>
					</select>
				</td>
			</tr>

			<tr>
				<td><label>Inquilino</label></td>
				<td>
					<select th:field="*{idInquilinoSeleccionado}">
						<option th:each="i : ${allInquilinos}" th:value="${i.id}" th:text="${i.nombre + ' ' + i.apellido}"></option>
					</select>
				</td>
			</tr>

			<tr>
				<td><label>Fecha de inicio</label></td>
				<td><input type="date" th:field="*{fechaInicio}" /></td>
				<td>
					<p th:if="${#fields.hasErrors('fechaInicio')}" th:errorclass="error" th:errors="*{fechaInicio}" />
				</td>
			</tr>

			<tr>
				<td><label>Duración en meses</label></td>
				<td><input type="number" th:field="*{duracionMeses}" /></td>
				<td>
					<p th:if="${#fields.hasErrors('duracionMeses')}" th:errorclass="error" th:errors="*{duracionMeses}" />
				</td>
			</tr>

			<tr>
				<td><label>Importe mensual</label></td>
				<td><input type="number" step="0.01" th:field="*{importeMensual}" /></td>
				<td>
					<p th:if="${#fields.hasErrors('importeMensual')}" th:errorclass="error" th:errors="*{importeMensual}" />
				</td>
			</tr>

			<tr>
				<td><label>Día de vencimiento mensual</label></td>
				<td><input type="number" th:field="*{diaVencimientoMensual}" /></td>
				<td>
					<p th:if="${#fields.hasErrors('diaVencimientoMensual')}" th:errorclass="error" th:errors="*{diaVencimientoMensual}" />
				</td>
			</tr>

			<tr>
				<td><label>Descripción</label></td>
				<td><input type="text" th:field="*{descripcion}" /></td>
				<td>
					<p th:if="${#fields.hasErrors('descripcion')}" th:errorclass="error" th:errors="*{descripcion}" />
				</td>
			</tr>

			<tr>
				<td><label>Estado</label></td>
				<td>
					<select th:field="*{estado}">
						<option th:each="e : ${estadosContrato}" th:value="${e}" th:text="${e}"></option>
					</select>
				</td>
				<td>
					<p th:if="${#fields.hasErrors('estado')}" th:errorclass="error" th:errors="*{estado}" />
				</td>
			</tr>
		</table>

		<table class="botones">
			<tr>
				<td><button type="submit" name="action" value="actionAceptar" th:text="#{botones.aceptar}" /></td>
				<td><button type="submit" name="action" value="actionCancelar" th:text="#{botones.cancelar}" /></td>
			</tr>
		</table>
	</form>
</body>

</html>
